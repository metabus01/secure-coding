{% extends "base.html" %}
{% block title %}구매 내역{% endblock %}
{% block content %}
<h2>구매 내역</h2>
<ul>
  {% for p in products %}
    <li>
      <a class="card" href="{{ url_for('view_product', product_id=p.id) }}">{{ p.title }}</a>
      <span class="muted"> - {{ p.price }}원</span>
    </li>
  {% else %}
    <li class="muted">구매한 상품이 없습니다.</li>
  {% endfor %}
</ul>
{% endblock %}
