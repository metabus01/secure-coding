{% extends "base.html" %}
{% block title %}상품 수정{% endblock %}
{% block content %}
<h2>상품 수정</h2>
<form method="post" action="{{ url_for('edit_product', product_id=product.id) }}" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>상품명</label>
  <input type="text" name="title" value="{{ product.title }}" required>
  <label>설명</label>
  <textarea name="description" rows="4" required>{{ product.description }}</textarea>
  <label>가격(원)</label>
  <input type="number" name="price" value="{{ product.price }}" min="0" required>
  <label>상품 사진 교체 (선택)</label>
  {% if product.image %}<p><img src="{{ url_for('uploaded_file', filename=product.image) }}" style="max-width:200px;border-radius:6px;"></p>{% endif %}
  <input type="file" name="image" accept="image/*">
  <button type="submit">수정</button>
</form>
{% endblock %}
